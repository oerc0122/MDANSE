name: Lint

on:
  push:
  pull_request:
  schedule:
    - cron: "0 0 * * *"

jobs:
  lint-mdanse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: psf/black@stable
        with:
          options: "--check --verbose"
          src: "MDANSE/Src"

  lint_check_ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/ruff-action@v3
        with:
          src: "./MDANSE/Src"
          args: "check"

  lint-mdanse-gui:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: psf/black@stable
        with:
          options: "--check --verbose"
          src: "MDANSE_GUI/Src"

  lint_check_ruff_gui:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/ruff-action@v3
        with:
          src: "./MDANSE_GUI/Src"
          args: "check"
