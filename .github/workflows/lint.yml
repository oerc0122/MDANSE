name: Lint

on:
  push:
  pull_request:
  schedule:
    - cron: "0 0 * * *"

jobs:
  lint_format_ruff:
    runs-on: ubuntu-latest
    - uses: actions/checkout@v4
    - uses: astral-sh/ruff-action@v3
      with:
        src: "MDANSE/src"
    - name: Analysing the code with Ruff
      run: |
        ruff format --check

  lint_ruff:
    runs-on: ubuntu-latest
    - uses: actions/checkout@v4
    - uses: astral-sh/ruff-action@v3
      with:
        src: "MDANSE/src"
    - name: Analysing the code with Ruff
      run: |
        ruff check

  lint-mdanse-gui:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: psf/black@stable
        with:
          options: "--check --verbose"
          src: "MDANSE_GUI/Src"
