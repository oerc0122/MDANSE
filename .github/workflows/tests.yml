name: Test MDANSE

on:
  pull_request:
  schedule:
    - cron: "0 0 * * *"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: (${{ matrix.os }}-${{ matrix.python-version }}) Build MDANSE and run tests
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macOS-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    if: ${{ !contains( github.ref, 'legacy' ) }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install MDANSE
        working-directory: MDANSE
        run: python -m pip install --group test --group external .

      - name: Run unit tests
        working-directory: MDANSE
        run: pytest


  test_GUI:
    name: (${{ matrix.os }}-${{ matrix.python-version }}) Build MDANSE_GUI and run_gui tests
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
       os: [ubuntu-latest, windows-latest, macOS-latest]
       python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Disable mandb
        if: ${{ matrix.os  == 'ubuntu-latest' }}
        run: |
          # Disable mandb
          echo "set man-db/auto-update false" | sudo debconf-communicate
          sudo dpkg-reconfigure man-db

      - uses: pyvista/setup-headless-display-action@v3
        if: ${{ matrix.os  == 'ubuntu-latest' }}
        with:
          qt: true

      - name: Install MDANSE
        working-directory: MDANSE
        run: python -m pip install --group test --group external .

      - name: Install MDANSE_GUI
        working-directory: MDANSE_GUI
        run: python -m pip install --group test .

      - name: Run GUI unit tests
        working-directory: MDANSE_GUI
        run: pytest
